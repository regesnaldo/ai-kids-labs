<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Kids Labs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
        .neon-text { text-shadow: 0 0 10px #22d3ee; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const AILearnPlatform = () => {
            const [selectedCategory, setSelectedCategory] = useState('all');
            const [showParentDashboard, setShowParentDashboard] = useState(false);

            // Dados extraídos da sua imagem (image_db8249.jpg)
            const content = [
                { id: 1, titulo: 'O que é Inteligência Artificial?', categoria: 'basico', duracao: '8 min', nivel: 'Iniciante', ageRating: '7+', descricao: 'Descubra o que é IA de forma divertida e simples!' },
                { id: 2, titulo: 'Como os Robôs Aprendem?', categoria: 'robôs', duracao: '12 min', nivel: 'Intermediário', ageRating: '8+', descricao: 'Explore como as máquinas aprendem através de exemplos!' },
                { id: 3, titulo: 'IA nos Videogames', categoria: 'jogos', duracao: '15 min', nivel: 'Intermediário', ageRating: '9+', descricao: 'Descubra como a IA torna os jogos mais inteligentes!' },
                { id: 4, titulo: 'Carros Autônomos', categoria: 'futuro', duracao: '10 min', nivel: 'Avançado', ageRating: '9+', descricao: 'Como os carros podem dirigir sozinhos?' },
                { id: 5, titulo: 'Assistentes Virtuais', categoria: 'basico', duracao: '9 min', nivel: 'Iniciante', ageRating: '7+', descricao: 'Como a Alexa e a Siri entendem o que você fala?' },
                { id: 6, titulo: 'IA e Arte Digital', categoria: 'futuro', duracao: '14 min', nivel: 'Intermediário', ageRating: '8+', descricao: 'Máquinas podem criar arte? Descubra!' }
            ];

            // Painel dos Pais (image_db8249.jpg)
            if (showParentDashboard) {
                return (
                    <div className="p-8 max-w-4xl mx-auto">
                        <div className="flex justify-between items-center mb-8">
                            <h1 className="text-3xl font-bold neon-text">Painel dos Pais</h1>
                            <button onClick={() => setShowParentDashboard(false)} className="px-4 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">← Voltar</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                <p className="text-slate-400 text-sm">Tempo assistido</p>
                                <p className="text-2xl font-bold">2h 45min</p>
                            </div>
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                <p className="text-slate-400 text-sm">Vídeos vistos</p>
                                <p className="text-2xl font-bold">6 vídeos</p>
                            </div>
                            <div className="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                                <p className="text-slate-400 text-sm">Completados</p>
                                <p className="text-2xl font-bold">85%</p>
                            </div>
                        </div>
                        <h2 className="text-xl font-bold mb-4">Progresso por Categoria</h2>
                        <div className="space-y-4">
                            {['Básico', 'Robôs', 'Jogos'].map(cat => (
                                <div key={cat} className="bg-slate-800 p-4 rounded-xl">
                                    <div className="flex justify-between mb-2"><span>{cat}</span><span>75%</span></div>
                                    <div className="w-full bg-slate-700 h-2 rounded-full"><div className="bg-cyan-400 h-full w-[75%] rounded-full"></div></div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }

            return (
                <div className="p-6 md:p-12">
                    <header className="flex justify-between items-center mb-12">
                        <div>
                            <h1 className="text-4xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-blue-500">A.I. KIDS LABS</h1>
                            <p className="text-slate-400">Educação para o Futuro</p>
                        </div>
                        <button onClick={() => setShowParentDashboard(true)} className="px-5 py-2 bg-blue-600 rounded-xl font-bold hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                            👨‍👩‍👧‍👦 Pais
                        </button>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {content.map(item => (
                            <div key={item.id} className="bg-slate-800 border border-slate-700 p-6 rounded-3xl hover:border-cyan-500 transition-all">
                                <div className="flex justify-between mb-4">
                                    <span className="bg-cyan-500/10 text-cyan-400 text-[10px] font-bold px-2 py-1 rounded-full uppercase">{item.ageRating}</span>
                                    <span className="text-slate-500 text-xs">⏱ {item.duracao}</span>
                                </div>
                                <h3 className="text-xl font-bold mb-2">{item.titulo}</h3>
                                <p className="text-slate-400 text-sm mb-6">{item.descricao}</p>
                                <button className="w-full py-3 bg-slate-700 hover:bg-cyan-600 rounded-xl font-bold transition">Começar Aula</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AILearnPlatform />);
    </script>
</body>
</html>
