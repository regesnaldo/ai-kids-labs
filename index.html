<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - A.I. KIDS LABS</title>
    <style>
        :root { --netflix-red: #E50914; --dark-bg: #141414; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--dark-bg); color: white; overflow-x: hidden; }

        /* HEADER ESTILO NETFLIX */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            transition: background 0.5s;
        }
        .logo { color: var(--netflix-red); font-size: 1.8rem; font-weight: bold; letter-spacing: -1px; }
        .nav-buttons { display: flex; gap: 15px; align-items: center; margin-right: 50px;}
        .btn-parental { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        .btn-fullscreen { background: none; border: 1px solid white; color: white; padding: 5px 10px; border-radius: 4px; cursor: pointer; }

        /* BANNER PRINCIPAL (HERO) */
        .hero { 
            height: 80vh; background: linear-gradient(to top, var(--dark-bg), transparent 50%), 
            url('https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1600'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; padding-left: 4%;
        }
        .hero-title { font-size: 4rem; margin-bottom: 0; }
        .hero-desc { font-size: 1.2rem; max-width: 600px; margin: 20px 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero-btns { display: flex; gap: 10px; }
        .btn-play { background: white; color: black; padding: 10px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; }
        .btn-info { background: rgba(109, 109, 110, 0.7); color: white; padding: 10px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; font-size: 1.1rem; }

        /* CARROSSEL DE TEMPORADAS */
        .main-container { padding: 0 4% 50px 4%; margin-top: -100px; position: relative; z-index: 10; }
        .row-title { font-size: 1.4vw; color: #e5e5e5; margin: 40px 0 10px 0; font-weight: bold; }
        .row-posters { display: flex; overflow-x: scroll; overflow-y: hidden; padding: 20px 0; scrollbar-width: none; }
        .row-posters::-webkit-scrollbar { display: none; }
        
        .poster { 
            min-width: 250px; height: 140px; object-fit: cover; border-radius: 4px; margin-right: 10px;
            transition: transform 450ms; cursor: pointer; position: relative;
            background-size: cover; background-position: center;
            display: flex; align-items: flex-end;
        }
        .poster:hover { transform: scale(1.08); z-index: 100; }
        .poster-title { background: rgba(0,0,0,0.8); width: 100%; padding: 8px; font-size: 0.8rem; text-align: center; border-radius: 0 0 4px 4px; }
    </style>
</head>
<body>

    <header id="navbar">
        <div class="logo">A.I. KIDS LABS</div>
        <div class="nav-buttons">
            <button class="btn-fullscreen" onclick="toggleFullScreen()">⛶ TELA CHEIA</button>
            <button class="btn-parental">ÁREA DOS PAIS</button>
        </div>
    </header>

    <section class="hero">
        <h1 class="hero-title">O Despertar da IA</h1>
        <p class="hero-desc">Descubra como os robôs pensam e aprenda a criar o futuro nesta temporada exclusiva para pequenos gênios.</p>
        <div class="hero-btns">
            <button class="btn-play">▶ Assistir</button>
            <button class="btn-info">ⓘ Mais Informações</button>
        </div>
    </section>

    <div class="main-container" id="content-rows">
        </div>

    <script>
        // Função Tela Cheia
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                if (document.exitFullscreen) { document.exitFullscreen(); }
            }
        }

        const data = [
            { t: "Temporada 1: O Despertar", img: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=400", m: ["O que é IA?", "Robôs Amigos", "Cérebro Digital", "Primeiros Passos"] },
            { t: "Temporada 2: Super Poderes", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400", m: ["Fotos Mágicas", "Desenhos de IA", "Música Digital"] },
            { t: "Temporada 3: Exploradores", img: "https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=400", m: ["Carros Autônomos", "IA no Espaço", "Doutor Robô"] },
            { t: "Temporada 4: Fábrica de Histórias", img: "https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400", m: ["Criando Contos", "Roteiros", "Personagens"] },
            { t: "Temporada 5: Som e Ritmo", img: "https://images.unsplash.com/photo-1514525253361-bee8718a3039?w=400", m: ["Composição", "Vozes de Robô", "DJ IA"] },
            { t: "Temporada 6: Detetives Digitais", img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?w=400", m: ["O que é Real?", "Privacidade", "Segurança"] },
            { t: "Temporada 7: IA no Dia a Dia", img: "https://images.unsplash.com/photo-1512428559083-a401c403932e?w=400", m: ["Netflix e GPS", "Algoritmos", "Filtros"] },
            { t: "Temporada 8: Criadores de Games", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400", m: ["Vilões Inteligentes", "Mundos Infinitos"] },
            { t: "Temporada 9: Protetores da Terra", img: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400", m: ["Clima", "Animais", "Energia Clean"] },
            { t: "Temporada 10: Formatura", img: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=400", m: ["Meu Grande Projeto", "Certificado"] }
        ];

        const container = document.getElementById('content-rows');
        data.forEach(item => {
            const row = document.createElement('div');
            row.innerHTML = `
                <h2 class="row-title">${item.t}</h2>
                <div class="row-posters">
                    ${item.m.map(mod => `
                        <div class="poster" style="background-image: url('${item.img}')">
                            <div class="poster-title">${mod}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.appendChild(row);
        });

        // Efeito do Header ao rolar
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 100) nav.style.background = '#141414';
            else nav.style.background = 'linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent)';
        });
    </script>
</body>
</html>
