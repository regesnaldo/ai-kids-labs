<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - A.I. KIDS LABS</title>
    <style>
        :root { --netflix-red: #E50914; --dark-bg: #141414; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--dark-bg); color: white; overflow-x: hidden; }

        /* HEADER */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 20px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.8) 10%, transparent);
        }
        .logo { color: var(--netflix-red); font-size: 2rem; font-weight: bold; }
        .nav-buttons { display: flex; gap: 15px; margin-right: 5%; }
        .btn-ui { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 8px 15px; border-radius: 4px; cursor: pointer; }

        /* BANNER */
        .hero { 
            height: 70vh; background: linear-gradient(to top, var(--dark-bg), transparent 60%), 
            url('https://images.unsplash.com/photo-1677442136019-21780ecad995?w=1600'); 
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; padding-left: 4%;
        }
        .hero-title { font-size: 4.5rem; margin: 0; }
        .btn-play { background: white; color: black; padding: 12px 35px; border-radius: 4px; font-weight: bold; border: none; font-size: 1.2rem; cursor: pointer; margin-top: 20px; }

        /* CARROSSEL E CARDS (AQUI ESTÁ O AUMENTO) */
        .main-container { padding: 0 4% 50px 4%; margin-top: -80px; position: relative; z-index: 10; }
        .row-title { font-size: 1.5rem; color: #e5e5e5; margin: 40px 0 15px 0; font-weight: bold; }
        
        .row-posters { 
            display: flex; 
            overflow-x: auto; 
            padding: 20px 0; 
            scrollbar-width: none; 
            gap: 15px;
        }
        .row-posters::-webkit-scrollbar { display: none; }
        
        .poster { 
            /* TAMANHO AMPLIADO AQUI */
            min-width: 350px; 
            height: 197px; 
            background-size: cover;
            background-position: center;
            border-radius: 6px;
            transition: transform 450ms;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            flex-shrink: 0;
        }
        .poster:hover { transform: scale(1.1); z-index: 100; border: 2px solid white; }
        .poster-title { background: rgba(0,0,0,0.85); width: 100%; padding: 12px; font-size: 1rem; text-align: center; border-radius: 0 0 6px 6px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo">A.I. KIDS LABS</div>
        <div class="nav-buttons">
            <button class="btn-ui" onclick="document.documentElement.requestFullscreen()">⛶ TELA CHEIA</button>
            <button class="btn-ui">ÁREA DOS PAIS</button>
        </div>
    </header>

    <section class="hero">
        <h1 class="hero-title">O Despertar da IA</h1>
        <button class="btn-play">▶ Assistir Agora</button>
    </section>

    <div class="main-container" id="content-rows">
        </div>

    <script>
        const temporadas = [
            { t: "Temporada 1: O Despertar", img: "https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=600", m: ["1. O que é IA?", "2. Robôs Amigos", "3. Cérebro Digital"] },
            { t: "Temporada 2: Super Poderes", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=600", m: ["1. Fotos Mágicas", "2. Desenhos de IA"] }
        ];

        const container = document.getElementById('content-rows');
        temporadas.forEach(item => {
            const html = `
                <h2 class="row-title">${item.t}</h2>
                <div class="row-posters">
                    ${item.m.map(mod => `
                        <div class="poster" style="background-image: url('${item.img}')">
                            <div class="poster-title">${mod}</div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML += html;
        });
    </script>
</body>
</html>
